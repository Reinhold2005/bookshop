services:
  - type: web
    name: bookshop
    runtime: image
    repo: https://github.com/Reinhold2005/bookshop
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://bookshop.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
    buildCommand: |
      curl -s https://getcomposer.org/installer | php
      php composer.phar install --optimize-autoloader --no-dev
      cp .env.example .env
      php artisan key:generate
      npm install
      npm run build
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
